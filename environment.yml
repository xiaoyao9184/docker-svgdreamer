name: svgdreamer
channels:
  - pytorch
  - nvidia
  - xformers
  - anaconda
  - conda-forge
dependencies:
  - python=3.10

  - pytorch::pytorch==2.3.1
  - pytorch::torchvision==0.18.1
  - pytorch::torchaudio==2.3.1
  - pytorch::pytorch-cuda==11.8

  # fix pytorch iJIT_NotifyEvent error
  - anaconda::mkl=2023.1.0

  - xformers::xformers==0.0.27

  - pip:
    - -r requirements.txt
